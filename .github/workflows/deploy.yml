name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to IONOS SFTP
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://www.raulmermans.com
      SFTP_HOST: ${{ secrets.SFTP_HOST || secrets.SFTP_SERVER }}
      SFTP_USER: ${{ secrets.SFTP_USER || secrets.SFTP_USERNAME }}
      SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH || '/' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Verify export output
        run: |
          if [ ! -d out ]; then
            echo "Static export directory ./out/ was not generated."
            exit 1
          fi

      - name: Deploy to IONOS via SFTP
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: ${{ env.SFTP_HOST }}
          username: ${{ env.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          localDir: ./out/
          remoteDir: ${{ env.SFTP_REMOTE_PATH }}
