name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to IONOS SFTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://www.raulmermans.com' }}

      - name: Deploy to IONOS via SFTP
        env:
          SFTP_SERVER: ${{ secrets.SFTP_SERVER }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          SFTP_PORT: ${{ secrets.SFTP_PORT }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq openssh-client lftp
          PORT="${SFTP_PORT:-22}"
          lftp -u "$SFTP_USERNAME,$SFTP_PASSWORD" -e "
            set sftp:auto-confirm yes
            set net:timeout 30
            set net:max-retries 3
            open sftp://$SFTP_SERVER:$PORT
            mirror -R -v --delete ./out/ /
            quit
          "


