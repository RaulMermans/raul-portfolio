name: Deploy to IONOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to IONOS SFTP
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://www.raulmermans.com
      SFTP_HOST: ${{ secrets.SFTP_HOST || secrets.SFTP_SERVER }}
      SFTP_USER: ${{ secrets.SFTP_USER || secrets.SFTP_USERNAME }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_PORT: ${{ secrets.SFTP_PORT || 22 }}
      SFTP_REMOTE_PATH: ${{ secrets.SFTP_REMOTE_PATH }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate deployment configuration
        run: |
          test -n "$SFTP_HOST" || { echo "Missing SFTP_HOST secret."; exit 1; }
          test -n "$SFTP_USER" || { echo "Missing SFTP_USER secret."; exit 1; }
          test -n "$SFTP_PASSWORD" || { echo "Missing SFTP_PASSWORD secret."; exit 1; }
          test -n "$SFTP_REMOTE_PATH" || { echo "Missing SFTP_REMOTE_PATH secret."; exit 1; }

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Verify export output
        run: npm run verify:export

      - name: Write deployment fingerprint
        run: |
          {
            echo "sha=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "deployed_at=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          } > out/deploy-version.txt
          cat out/deploy-version.txt

      - name: Deploy to IONOS via SFTP
        uses: wangyucode/sftp-upload-action@v3.0.0
        with:
          host: ${{ env.SFTP_HOST }}
          username: ${{ env.SFTP_USER }}
          password: ${{ env.SFTP_PASSWORD }}
          port: ${{ env.SFTP_PORT }}
          localDir: ./out/
          remoteDir: ${{ env.SFTP_REMOTE_PATH }}
          forceUpload: true
          removeExtraFilesOnServer: true
          concurrency: 8

      - name: Verify production deployment
        env:
          DEPLOY_VERSION: ${{ github.sha }}
        run: |
          curl --fail --silent --show-error \
            -H "Cache-Control: no-cache" \
            "https://www.raulmermans.com/deploy-version.txt?v=${DEPLOY_VERSION}" \
            --output /tmp/deploy-version.txt

          cat /tmp/deploy-version.txt
          grep -Fq "sha=${DEPLOY_VERSION}" /tmp/deploy-version.txt

          verify_copy() {
            url="$1"
            output="$2"
            expected="$3"

            for attempt in 1 2 3 4 5 6; do
              curl --fail --silent --show-error \
                -H "Cache-Control: no-cache" \
                "${url}?v=${DEPLOY_VERSION}-${attempt}" \
                --output "$output"

              if grep -Fq "$expected" "$output"; then
                return 0
              fi

              sleep 10
            done

            return 1
          }

          verify_copy "https://www.raulmermans.com/en/" /tmp/raul-en.html "Creative infrastructure for AI-assisted execution"
          verify_copy "https://www.raulmermans.com/" /tmp/raul-es.html "Infraestructura creativa para ejecución asistida por IA"
          verify_copy "https://www.raulmermans.com/en/case-studies/" /tmp/cases-en.html "View case study: BlogAgent"
          verify_copy "https://www.raulmermans.com/case-studies/" /tmp/cases-es.html "Ver caso de estudio: BlogAgent"
          verify_copy "https://www.raulmermans.com/en/case-studies/blogagent/" /tmp/blogagent-en.html "human review before publication"
          verify_copy "https://www.raulmermans.com/case-studies/blogagent/" /tmp/blogagent-es.html "revisión humana antes de publicar"

          verify_copy "https://www.raulmermans.com/en/services/ai-integrations/" /tmp/service-ai-en.html "AI Integrations for Creative Systems"
          verify_copy "https://www.raulmermans.com/en/services/creative-automation/" /tmp/service-automation-en.html "Creative Automation"
          verify_copy "https://www.raulmermans.com/en/services/brand-systems/" /tmp/service-brand-en.html "Brand Intelligence Systems"
          verify_copy "https://www.raulmermans.com/en/services/product-prototypes/" /tmp/service-prototype-en.html "AI Product Prototypes"

          verify_copy "https://www.raulmermans.com/services/integraciones-ia/" /tmp/service-ai-es.html "Integraciones IA para Sistemas Creativos"
          verify_copy "https://www.raulmermans.com/services/automatizacion-creativa/" /tmp/service-automation-es.html "Automatización Creativa"
          verify_copy "https://www.raulmermans.com/services/sistemas-de-marca/" /tmp/service-brand-es.html "Sistemas de Inteligencia de Marca"
          verify_copy "https://www.raulmermans.com/services/prototipos-producto-ia/" /tmp/service-prototype-es.html "Prototipos de Producto IA"

          ! grep -Fq "Request an AI Workflow Audit" /tmp/raul-en.html
          ! grep -Fq "Marketing + CRM" /tmp/raul-en.html
          ! grep -Fq "Sistemas de IA · Agentes · Automatización" /tmp/raul-es.html
          ! grep -Fq "Automatización CRM" /tmp/raul-es.html
          ! grep -Fq "Digital identity system that structures AI/product work" /tmp/cases-en.html
          ! grep -Fq "For faster UX, SEO, and conversion diagnostics" /tmp/cases-en.html
