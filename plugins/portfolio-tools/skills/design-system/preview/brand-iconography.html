<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .tile { display:flex;flex-direction:column;align-items:center;gap:8px;flex:1; }
  .big { font-family:var(--font-display); font-size:48px; line-height:1; color:var(--ink); text-align:center; }
  .sub { font-family:var(--font-mono); font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink-muted); text-align:center; }
  .c { width:44px; height:44px; border-radius:50%; border:1px solid var(--ink); display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; color:var(--ink); }
</style></head>
<body><div class="card">
  <div class="mono">Iconography · glyph + letterform · no icon font</div>
  <div style="display:flex;gap:20px;margin-top:14px;align-items:center">
    <div class="tile"><div class="big">→</div><div class="sub">arrow · buttons</div></div>
    <div class="tile"><div class="big">↗</div><div class="sub">external · cards</div></div>
    <div class="tile"><div class="big" style="font-size:36px">·</div><div class="sub">interpunct</div></div>
    <div class="tile"><div class="big" style="font-size:36px">//</div><div class="sub">list marker</div></div>
    <div class="tile"><div class="big">✕</div><div class="sub">close</div></div>
    <div class="tile"><div class="c">IG</div><div class="sub">letter mark</div></div>
  </div>
</div></body></html>
