<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; }
  .label { font-family:var(--font-mono); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--ink-faint); }
  .input { padding:12px 14px; background:var(--cream-light); border:1px solid var(--cream-dark); border-radius:8px; font-family:var(--font-body); font-size:15px; color:var(--ink); outline:none; box-shadow:0 2px 8px rgba(26,23,20,0.04); transition: border-color 0.3s; }
  .input:focus { border-color:var(--accent); box-shadow:0 0 0 4px rgba(196,30,58,0.10); }
  .input.focused { border-color:#C41E3A; box-shadow:0 0 0 4px rgba(196,30,58,0.10); }
</style></head>
<body><div class="card">
  <div class="mono">Form fields · 8px radius · soft shadow · crimson focus ring</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px">
    <div class="field"><span class="label">Name</span><input class="input" value="Raúl Mermans"/></div>
    <div class="field"><span class="label">Email</span><input class="input focused" value="hola@raulmermans.com"/></div>
    <div class="field" style="grid-column:span 2"><span class="label">Message</span><textarea class="input" rows="2" style="resize:none">Let's build the right system.</textarea></div>
  </div>
</div></body></html>
