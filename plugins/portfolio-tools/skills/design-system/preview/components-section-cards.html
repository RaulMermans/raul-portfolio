<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .section-card { flex:1; height:220px; position:relative; overflow:hidden; color:var(--cream); padding:18px; box-sizing:border-box; display:flex; flex-direction:column; justify-content:space-between; border:1px solid var(--ink); }
  .section-card .scrim { position:absolute; inset:0; background:linear-gradient(180deg, rgba(26,23,20,0.1) 0%, rgba(26,23,20,0.85) 100%); }
  .section-card .content { position:relative; z-index:2; display:flex; flex-direction:column; gap:4px; }
  .section-card .eye { font-family:var(--font-mono); font-size:10px; letter-spacing:0.25em; text-transform:uppercase; opacity:0.7; }
  .section-card .title { font-family:var(--font-display); font-size:28px; line-height:0.95; text-transform:uppercase; letter-spacing:-0.02em; }
  .section-card .meta { font-family:var(--font-mono); font-size:10px; letter-spacing:0.15em; text-transform:uppercase; opacity:0.6; position:relative; z-index:2; }
</style></head>
<body><div class="card">
  <div class="mono">Section card · full-bleed · dark scrim · per-section accent bar</div>
  <div style="display:flex;gap:14px;margin-top:14px">
    <div class="section-card" style="background:linear-gradient(135deg,#6B635A,#1A1714)"><div class="scrim"></div><div class="content"><span class="eye" style="color:#b94a53">Case Studies</span><span class="title">AI for Retail</span></div><span class="meta">01 / 04 ↗</span></div>
    <div class="section-card" style="background:linear-gradient(135deg,#3f9f8b,#1A1714)"><div class="scrim"></div><div class="content"><span class="eye" style="color:#FFB5A0">Apps</span><span class="title">Overflow</span></div><span class="meta">02 / 04 ↗</span></div>
    <div class="section-card" style="background:linear-gradient(135deg,#9c7847,#1A1714)"><div class="scrim"></div><div class="content"><span class="eye" style="color:#E8D0C8">Photography</span><span class="title">Archive 23</span></div><span class="meta">03 / 04 ↗</span></div>
  </div>
</div></body></html>
