<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .serv { flex:1; padding:20px 18px; border-right:1px solid var(--ink); position:relative; transition:flex 0.5s cubic-bezier(0.16,1,0.3,1); min-height:220px; display:flex; flex-direction:column; justify-content:space-between; }
  .serv:last-child { border-right:none; }
  .serv.open { flex:3; background:var(--cream-warm); }
  .serv .num { font-family:var(--font-mono); font-size:11px; letter-spacing:0.25em; color:var(--ink-faint); }
  .serv .title { font-family:var(--font-display); font-size:32px; line-height:0.95; text-transform:uppercase; letter-spacing:-0.02em; color:var(--ink); margin-top:10px; }
  .serv .tags { font-family:var(--font-mono); font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink-muted); margin-top:6px; }
  .serv .desc { font-family:var(--font-body); font-size:13px; line-height:1.5; color:var(--ink-soft); margin-top:14px; max-width:220px; display:none; }
  .serv.open .desc { display:block; }
</style></head>
<body><div class="card">
  <div class="mono">Services accordion · flex-steal on hover</div>
  <div style="display:flex;margin-top:14px;border:1px solid var(--ink)">
    <div class="serv open"><div><span class="num">/ 01</span><div class="title">AI Systems</div><div class="tags">Agents · Automation</div><p class="desc">Applied AI systems that turn repetitive, judgment-heavy work into reliable execution — built for real teams, not demo theatre.</p></div><span class="num">↗</span></div>
    <div class="serv"><div><span class="num">/ 02</span><div class="title">Web Dev</div></div><span class="num">↗</span></div>
    <div class="serv"><div><span class="num">/ 03</span><div class="title">Photo</div></div><span class="num">↗</span></div>
    <div class="serv"><div><span class="num">/ 04</span><div class="title">Creative</div></div><span class="num">↗</span></div>
  </div>
</div></body></html>
