<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .btn { display:inline-flex; align-items:center; gap:10px; padding:14px 28px; font-family:var(--font-mono); font-size:13px; letter-spacing:0.2em; text-transform:uppercase; background:transparent; border:1px solid var(--ink); color:var(--ink); cursor:pointer; transition:all 0.3s cubic-bezier(0.16,1,0.3,1); min-height:44px; box-sizing:border-box; }
  .btn.primary { background:var(--ink); color:var(--cream); }
  .btn.accent { border-color:var(--accent); color:var(--accent); }
  .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(196,30,58,0.20); border-color:var(--accent); color:var(--accent); }
  .btn.primary:hover { background:var(--accent); color:var(--cream); border-color:var(--accent); }
</style>
</head>
<body><div class="card">
  <div class="mono">Buttons · hairline · uppercase mono label · arrow suffix</div>
  <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:16px;align-items:center">
    <button class="btn primary">Start a Project <span>→</span></button>
    <button class="btn">View Work <span>→</span></button>
    <button class="btn accent">Send <span>→</span></button>
  </div>
  <div class="mono" style="margin-top:14px;color:var(--ink-muted);letter-spacing:0.1em;text-transform:none">Hover: lift 3px · border + text → accent · crimson soft shadow</div>
</div></body></html>
