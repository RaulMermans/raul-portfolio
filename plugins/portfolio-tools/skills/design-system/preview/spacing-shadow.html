<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="mono">Shadow · restrained · accent only on hover</div>
  <div style="display:flex;gap:16px;margin-top:16px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px"><div style="width:110px;height:70px;background:var(--cream-light);box-shadow:0 2px 8px rgba(26,23,20,0.04)"></div><span class="mono" style="text-align:center">soft<br/>·input at rest</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px"><div style="width:110px;height:70px;background:var(--cream-light);box-shadow:0 8px 32px rgba(26,23,20,0.08), 0 2px 8px rgba(26,23,20,0.04)"></div><span class="mono" style="text-align:center">card<br/>·glass contact</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px"><div style="width:110px;height:70px;background:var(--cream-light);box-shadow:0 6px 16px rgba(196,30,58,0.20)"></div><span class="mono" style="text-align:center">hover-accent<br/>·button lift</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px"><div style="width:110px;height:70px;background:var(--cream-light);box-shadow:0 0 0 4px rgba(196,30,58,0.10)"></div><span class="mono" style="text-align:center">focus-accent<br/>·crimson ring</span></div>
  </div>
</div></body></html>
