<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="mono">Radius · default is 0 · soft only on inputs + glass</div>
  <div style="display:flex;gap:16px;margin-top:14px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:70px;height:70px;background:var(--ink);border-radius:0"></div><span class="mono">0 · default</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:70px;height:70px;background:var(--ink);border-radius:4px"></div><span class="mono">4 · sm</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:70px;height:70px;background:var(--ink);border-radius:8px"></div><span class="mono">8 · inputs</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:70px;height:70px;background:var(--ink);border-radius:16px"></div><span class="mono">16 · glass</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:70px;height:70px;background:var(--ink);border-radius:999px"></div><span class="mono">pill</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:70px;height:70px;background:var(--ink);border-radius:50%"></div><span class="mono">circle</span></div>
  </div>
</div></body></html>
