<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="mono">Spacing scale · rem-based · 12 steps</div>
  <div style="display:flex;align-items:flex-end;gap:6px;margin-top:14px;height:90px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:4px;background:var(--ink)"></div><span class="mono">1</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:8px;background:var(--ink)"></div><span class="mono">2</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:12px;background:var(--ink)"></div><span class="mono">3</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:16px;background:var(--ink)"></div><span class="mono">4</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:24px;background:var(--ink)"></div><span class="mono">5</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:32px;background:var(--ink)"></div><span class="mono">6</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:48px;background:var(--ink)"></div><span class="mono">7</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:64px;background:var(--ink)"></div><span class="mono">8</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:80px;background:var(--ink)"></div><span class="mono">9</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:96px;background:var(--ink);opacity:0.7"></div><span class="mono">10</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:112px;background:var(--ink);opacity:0.55"></div><span class="mono">11</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:128px;background:var(--ink);opacity:0.4"></div><span class="mono">12</span></div>
  </div>
</div></body></html>
