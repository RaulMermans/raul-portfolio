<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="mono">Fluid scale · clamp(320px → 1200px)</div>
  <table style="width:100%;margin-top:12px;border-collapse:collapse;font-family:var(--font-mono);font-size:12px;color:var(--ink-soft)">
    <tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 0;width:120px">--text-hero</td><td>4rem → 7.5rem</td><td style="text-align:right;font-family:var(--font-display);font-size:32px;line-height:1;color:var(--ink)">HERO</td></tr>
    <tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 0">--text-3xl</td><td>3.5rem → 5.5rem</td><td style="text-align:right;font-family:var(--font-display);font-size:24px;line-height:1;color:var(--ink)">TITLE</td></tr>
    <tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 0">--text-xl</td><td>2rem → 2.75rem</td><td style="text-align:right;font-family:var(--font-display);font-size:18px;line-height:1;color:var(--ink)">HEAD</td></tr>
    <tr style="border-bottom:1px solid var(--border)"><td style="padding:6px 0">--text-base</td><td>1rem → 1.125rem</td><td style="text-align:right;font-family:var(--font-body);font-size:14px;color:var(--ink)">Body</td></tr>
    <tr><td style="padding:6px 0">--text-xs</td><td>0.75rem → 0.8125rem</td><td style="text-align:right;font-family:var(--font-mono);font-size:11px;letter-spacing:0.2em;color:var(--ink)">EYEBROW</td></tr>
  </table>
</div></body></html>
