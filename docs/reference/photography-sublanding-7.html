<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Photography — Raúl Mermans</title>
  <meta name="description" content="Photography work by Raúl Mermans — Landscape and Architecture collections." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Space+Mono&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #F5F0EB;
      --cream-warm: #EDE6DD;
      --cream-dark: #DDD5C8;
      
      --ink: #1A1714;
      --ink-soft: #3A3530;
      --ink-muted: #6B635A;
      --ink-faint: #8A827A;
      
      --accent: #C41E3A;
      
      --gradient-warm: #FFAA88;
      --gradient-rose: #FFB5A0;
      --gradient-soft: #E8D0C8;
      
      --font-display: "Bebas Neue", Impact, sans-serif;
      --font-body: "DM Sans", system-ui, sans-serif;
      --font-mono: "Space Mono", monospace;
      
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-md: 1.125rem;
      
      --tracking-tight: -0.02em;
      --tracking-wide: 0.1em;
      --tracking-wider: 0.2em;
      --tracking-widest: 0.3em;
      
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.5rem;
      --space-6: 2rem;
      --space-7: 3rem;
      --space-8: 4rem;
      --space-9: 5rem;
      
      --touch-min: 44px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out: cubic-bezier(0.33, 1, 0.68, 1);
      --transition-fast: 0.15s;
      --transition-base: 0.3s;
      --transition-slow: 0.6s;
      
      --border-light: 1px solid var(--cream-dark);
      --border-dark: 1px solid var(--ink);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
    
    html, body {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; border: none; background: none; cursor: pointer; }
    :focus { outline: none; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ========================================
       FILM GRAIN
       ======================================== */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.03;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* ========================================
       CUSTOM CURSOR
       ======================================== */
    @media (hover: hover) and (pointer: fine) {
      .cursor {
        position: fixed;
        pointer-events: none;
        z-index: 10001;
        opacity: 0;
        transition: opacity var(--transition-base);
        mix-blend-mode: difference;
      }
      
      .cursor.visible { opacity: 1; }
      
      .cursor__dot {
        position: fixed;
        width: 8px;
        height: 8px;
        background: #fff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: transform var(--transition-fast) var(--ease),
                    width var(--transition-base) var(--ease),
                    height var(--transition-base) var(--ease);
      }
      
      .cursor__ring {
        position: fixed;
        width: 40px;
        height: 40px;
        border: 1.5px solid #fff;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width var(--transition-base) var(--ease),
                    height var(--transition-base) var(--ease),
                    border-width var(--transition-base) var(--ease);
      }
      
      .cursor.hovering .cursor__dot {
        width: 12px;
        height: 12px;
      }
      
      .cursor.hovering .cursor__ring {
        width: 60px;
        height: 60px;
        border-width: 2px;
      }
      
      .cursor.clicking .cursor__ring {
        width: 30px;
        height: 30px;
      }
      
      .cursor.clicking .cursor__dot {
        width: 6px;
        height: 6px;
      }
      
      body, a, button, .gallery__item { cursor: none; }
    }
    
    /* Default cursor for non-custom-cursor devices */
    @media (hover: none), (pointer: coarse) {
      .gallery__item { cursor: pointer; }
    }

    /* ========================================
       FIXED HEADER
       ======================================== */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-6);
      pointer-events: none;
    }
    
    .header > * {
      pointer-events: auto;
    }
    
    .header__logo {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      padding: var(--space-2);
      min-height: var(--touch-min);
      display: flex;
      align-items: center;
      transition: color var(--transition-base) var(--ease);
    }
    
    .header__logo:hover { color: var(--accent); }
    
    .header__nav {
      display: flex;
      gap: var(--space-5);
    }
    
    .header__nav a {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--ink-muted);
      padding: var(--space-2) var(--space-3);
      min-height: var(--touch-min);
      display: flex;
      align-items: center;
      position: relative;
      transition: color var(--transition-base) var(--ease);
    }
    
    .header__nav a::after {
      content: "";
      position: absolute;
      bottom: 6px;
      left: var(--space-3);
      right: var(--space-3);
      height: 1px;
      background: var(--ink);
      transform: scaleX(0);
      transition: transform var(--transition-base) var(--ease);
    }
    
    .header__nav a:hover { color: var(--ink); }
    .header__nav a:hover::after { transform: scaleX(1); }

    .header__menu-btn {
      display: none;
      width: var(--touch-min);
      height: var(--touch-min);
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }
    
    .header__menu-btn span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--ink);
      transition: all var(--transition-base) var(--ease);
    }
    
    .header__menu-btn.active span:nth-child(1) {
      transform: rotate(45deg) translate(5px, 5px);
    }
    
    .header__menu-btn.active span:nth-child(2) {
      opacity: 0;
    }
    
    .header__menu-btn.active span:nth-child(3) {
      transform: rotate(-45deg) translate(6px, -6px);
    }

    /* Mobile Menu */
    .mobile-menu {
      position: fixed;
      inset: 0;
      background: var(--cream);
      z-index: 99;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: var(--space-5);
      opacity: 0;
      visibility: hidden;
      transition: all 0.5s var(--ease);
    }
    
    .mobile-menu.active {
      opacity: 1;
      visibility: visible;
    }
    
    .mobile-menu a {
      font-family: var(--font-display);
      font-size: clamp(2rem, 8vw, 3.5rem);
      text-transform: uppercase;
      color: var(--ink);
      opacity: 0;
      transform: translateY(30px);
      transition: all 0.4s var(--ease);
    }
    
    .mobile-menu.active a {
      opacity: 1;
      transform: translateY(0);
    }
    
    .mobile-menu.active a:nth-child(1) { transition-delay: 0.1s; }
    .mobile-menu.active a:nth-child(2) { transition-delay: 0.15s; }
    .mobile-menu.active a:nth-child(3) { transition-delay: 0.2s; }
    .mobile-menu.active a:nth-child(4) { transition-delay: 0.25s; }
    
    .mobile-menu a:hover { color: var(--accent); }

    @media (max-width: 768px) {
      .header__nav { display: none; }
      .header__menu-btn { display: flex; }
      .header { padding: var(--space-4); }
    }

    /* ========================================
       GALLERY CONTAINER
       ======================================== */
    .gallery {
      width: 100%;
      height: 100vh;
      height: 100svh;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      align-items: center;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    
    .gallery::-webkit-scrollbar {
      display: none;
    }
    
    .gallery__track {
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 10vw;
      gap: 0;
      position: relative;
    }

    /* ========================================
       SCATTERED GRID LAYOUT
       ======================================== */
    .gallery__grid {
      display: grid;
      grid-template-columns: repeat(18, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: var(--space-4);
      width: max-content;
      min-width: 420vw;
      height: 85vh;
      padding: var(--space-9) 0;
    }

    .gallery__item {
      position: relative;
      overflow: hidden;
      transition: all var(--transition-slow) var(--ease);
      cursor: pointer;
    }
    
    .gallery__item img {
      transition: all var(--transition-slow) var(--ease);
      filter: grayscale(100%) contrast(0.95);
      opacity: 0.4;
    }
    
    .gallery__item.active img {
      filter: grayscale(0%) contrast(1);
      opacity: 1;
    }
    
    .gallery__item:hover img {
      filter: grayscale(0%) contrast(1.02);
      opacity: 1;
      transform: scale(1.03);
    }

    /* Scattered positioning for images - all categories interspersed */
    
    /* Landscape (1-12) - scattered throughout */
    .gallery__item:nth-child(1) { grid-column: 1; grid-row: 2 / 4; width: 160px; justify-self: end; }
    .gallery__item:nth-child(2) { grid-column: 2; grid-row: 4 / 6; width: 145px; align-self: start; margin-top: 2vh; }
    .gallery__item:nth-child(3) { grid-column: 4; grid-row: 1 / 3; width: 180px; justify-self: center; }
    .gallery__item:nth-child(4) { grid-column: 5; grid-row: 3 / 5; width: 170px; align-self: center; }
    .gallery__item:nth-child(5) { grid-column: 7; grid-row: 5 / 7; width: 155px; align-self: start; }
    .gallery__item:nth-child(6) { grid-column: 8; grid-row: 2 / 4; width: 165px; margin-top: -2vh; }
    .gallery__item:nth-child(7) { grid-column: 10; grid-row: 1 / 3; width: 150px; justify-self: start; }
    .gallery__item:nth-child(8) { grid-column: 12; grid-row: 4 / 6; width: 175px; align-self: start; }
    .gallery__item:nth-child(9) { grid-column: 13; grid-row: 2 / 4; width: 160px; justify-self: end; }
    .gallery__item:nth-child(10) { grid-column: 15; grid-row: 5 / 7; width: 170px; margin-top: 1vh; }
    .gallery__item:nth-child(11) { grid-column: 16; grid-row: 1 / 3; width: 155px; align-self: end; }
    .gallery__item:nth-child(12) { grid-column: 18; grid-row: 3 / 5; width: 165px; }
    
    /* Architecture (13-24) - scattered throughout */
    .gallery__item:nth-child(13) { grid-column: 1; grid-row: 5 / 7; width: 150px; justify-self: center; }
    .gallery__item:nth-child(14) { grid-column: 3; grid-row: 3 / 5; width: 175px; align-self: start; margin-top: 3vh; }
    .gallery__item:nth-child(15) { grid-column: 4; grid-row: 5 / 7; width: 160px; margin-top: 1vh; }
    .gallery__item:nth-child(16) { grid-column: 6; grid-row: 1 / 3; width: 180px; align-self: center; }
    .gallery__item:nth-child(17) { grid-column: 7; grid-row: 3 / 5; width: 145px; align-self: end; }
    .gallery__item:nth-child(18) { grid-column: 9; grid-row: 5 / 7; width: 170px; }
    .gallery__item:nth-child(19) { grid-column: 10; grid-row: 3 / 5; width: 155px; justify-self: end; margin-top: -1vh; }
    .gallery__item:nth-child(20) { grid-column: 11; grid-row: 1 / 3; width: 165px; margin-top: 2vh; }
    .gallery__item:nth-child(21) { grid-column: 13; grid-row: 5 / 7; width: 175px; }
    .gallery__item:nth-child(22) { grid-column: 14; grid-row: 1 / 3; width: 150px; align-self: start; }
    .gallery__item:nth-child(23) { grid-column: 16; grid-row: 4 / 6; width: 180px; margin-left: -1vw; }
    .gallery__item:nth-child(24) { grid-column: 17; grid-row: 1 / 3; width: 160px; justify-self: center; }
    
    /* Street (25-36) - scattered throughout */
    .gallery__item:nth-child(25) { grid-column: 2; grid-row: 1 / 3; width: 155px; justify-self: end; margin-top: 1vh; }
    .gallery__item:nth-child(26) { grid-column: 3; grid-row: 5 / 7; width: 170px; align-self: center; }
    .gallery__item:nth-child(27) { grid-column: 5; grid-row: 5 / 7; width: 145px; justify-self: center; }
    .gallery__item:nth-child(28) { grid-column: 6; grid-row: 3 / 5; width: 165px; align-self: start; }
    .gallery__item:nth-child(29) { grid-column: 8; grid-row: 5 / 7; width: 180px; align-self: end; margin-top: -2vh; }
    .gallery__item:nth-child(30) { grid-column: 9; grid-row: 1 / 3; width: 150px; margin-top: 3vh; }
    .gallery__item:nth-child(31) { grid-column: 11; grid-row: 4 / 6; width: 175px; justify-self: start; }
    .gallery__item:nth-child(32) { grid-column: 12; grid-row: 1 / 3; width: 160px; align-self: start; }
    .gallery__item:nth-child(33) { grid-column: 14; grid-row: 4 / 6; width: 155px; justify-self: end; }
    .gallery__item:nth-child(34) { grid-column: 15; grid-row: 2 / 4; width: 170px; margin-top: 1vh; }
    .gallery__item:nth-child(35) { grid-column: 17; grid-row: 5 / 7; width: 165px; align-self: center; }
    .gallery__item:nth-child(36) { grid-column: 18; grid-row: 1 / 3; width: 150px; justify-self: center; margin-top: -1vh; }

    /* Aspect ratios for variety */
    .gallery__item:nth-child(odd) { aspect-ratio: 3/4; }
    .gallery__item:nth-child(even) { aspect-ratio: 4/5; }
    .gallery__item:nth-child(3n) { aspect-ratio: 1/1; }
    .gallery__item:nth-child(4n) { aspect-ratio: 4/3; }

    /* ========================================
       CATEGORY OVERLAY
       ======================================== */
    .category-overlay {
      position: fixed;
      bottom: calc(var(--space-6) + 80px);
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 50;
      pointer-events: none;
    }
    
    .category-overlay__title {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 10rem);
      line-height: 0.85;
      letter-spacing: var(--tracking-tight);
      color: var(--ink);
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: var(--space-3);
      transition: opacity var(--transition-slow) var(--ease);
    }
    
    .category-overlay__count {
      font-family: var(--font-body);
      font-size: clamp(1rem, 2vw, 1.5rem);
      font-weight: 400;
      color: var(--ink-muted);
      margin-left: var(--space-2);
    }

    /* ========================================
       LIGHTBOX MODAL
       ======================================== */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9000;
      background: rgba(26, 23, 20, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-8);
      padding-bottom: calc(var(--space-8) + 60px);
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--transition-slow) var(--ease),
                  visibility var(--transition-slow);
    }
    
    .lightbox.active {
      opacity: 1;
      visibility: visible;
    }
    
    .lightbox__image {
      max-width: 90vw;
      max-height: 75vh;
      object-fit: contain;
      transform: scale(0.9);
      opacity: 0;
      transition: transform var(--transition-slow) var(--ease),
                  opacity var(--transition-slow) var(--ease);
    }
    
    .lightbox.active .lightbox__image {
      transform: scale(1);
      opacity: 1;
    }
    
    .lightbox__close {
      position: absolute;
      top: var(--space-6);
      right: var(--space-6);
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      transition: all var(--transition-base) var(--ease);
    }
    
    .lightbox__close:hover {
      border-color: rgba(255, 255, 255, 0.5);
      color: var(--cream);
      background: rgba(255, 255, 255, 0.1);
    }
    
    .lightbox__close svg {
      width: 20px;
      height: 20px;
    }
    
    .lightbox__nav {
      position: absolute;
      bottom: var(--space-7);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    
    .lightbox__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      border: none;
      padding: 0;
      transition: all var(--transition-base) var(--ease);
    }
    
    .lightbox__dot:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: scale(1.2);
    }
    
    .lightbox__dot.active {
      background: var(--cream);
      transform: scale(1.1);
    }
    
    .lightbox__counter {
      position: absolute;
      bottom: var(--space-7);
      left: var(--space-6);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-wide);
      color: rgba(255, 255, 255, 0.4);
    }
    
    .lightbox__hint {
      position: absolute;
      bottom: var(--space-7);
      right: var(--space-6);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
    }
    
    @media (max-width: 768px) {
      .lightbox {
        padding: var(--space-4);
        padding-bottom: calc(var(--space-4) + 50px);
      }
      
      .lightbox__image {
        max-height: 70vh;
      }
      
      .lightbox__close {
        top: var(--space-4);
        right: var(--space-4);
        width: 48px;
        height: 48px;
      }
      
      .lightbox__nav {
        bottom: var(--space-5);
        gap: var(--space-2);
      }
      
      .lightbox__dot {
        width: 8px;
        height: 8px;
      }
      
      .lightbox__counter,
      .lightbox__hint {
        display: none;
      }
    }

    /* ========================================
       BOTTOM NAV BAR
       ======================================== */
    .bottom-bar {
      position: fixed;
      bottom: var(--space-6);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 0;
      z-index: 100;
      background: var(--cream);
    }
    
    .bottom-bar__categories {
      display: flex;
    }
    
    .category-btn {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--ink-faint);
      padding: var(--space-4) var(--space-6);
      border: var(--border-light);
      min-height: 56px;
      min-width: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-base) var(--ease);
    }
    
    .category-btn + .category-btn {
      border-left: none;
    }
    
    .category-btn:hover {
      color: var(--ink);
      background: rgba(26, 23, 20, 0.02);
    }
    
    .category-btn.active {
      color: var(--ink);
      background: rgba(26, 23, 20, 0.04);
    }

    /* ========================================
       RESPONSIVE
       ======================================== */
    @media (max-width: 1200px) {
      .gallery__grid {
        min-width: 500vw;
      }
    }
    
    @media (max-width: 900px) {
      .gallery__grid {
        min-width: 600vw;
        gap: var(--space-3);
      }
      
      .gallery__item {
        width: 120px !important;
      }
      
      .category-overlay {
        bottom: calc(var(--space-4) + 70px);
      }
      
      .bottom-bar {
        bottom: var(--space-4);
      }
      
      .category-btn {
        min-width: 100px;
        padding: var(--space-3) var(--space-4);
        font-size: 0.65rem;
      }
    }
    
    @media (max-width: 600px) {
      .gallery__grid {
        min-width: 800vw;
        height: 75vh;
      }
      
      .gallery__item {
        width: 100px !important;
      }
      
      .category-overlay__title {
        font-size: clamp(2.5rem, 15vw, 4rem);
      }
      
      .category-overlay {
        bottom: calc(var(--space-4) + 60px);
      }
      
      .category-btn {
        min-width: 80px;
        min-height: 48px;
        padding: var(--space-2) var(--space-3);
      }
    }

    /* ========================================
       ANIMATIONS
       ======================================== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .header {
      opacity: 0;
      animation: fadeIn 0.8s var(--ease-out) 0.3s forwards;
    }
    
    .category-overlay {
      opacity: 0;
      animation: slideUp 0.8s var(--ease-out) 0.5s forwards;
    }
    
    .bottom-bar {
      opacity: 0;
      animation: fadeIn 0.8s var(--ease-out) 0.7s forwards;
    }
    
    .gallery__item {
      opacity: 0;
      transform: translateY(20px);
      animation: slideUp 0.6s var(--ease-out) forwards;
    }
    
    .gallery__item:nth-child(1) { animation-delay: 0.1s; }
    .gallery__item:nth-child(2) { animation-delay: 0.15s; }
    .gallery__item:nth-child(3) { animation-delay: 0.2s; }

  <script>
    (function() {
      // === MOBILE MENU ===
      const menuBtn = document.getElementById('menu-btn');
      const mobileMenu = document.getElementById('mobile-menu');
      const mobileLinks = mobileMenu.querySelectorAll('a');
      
      menuBtn.addEventListener('click', () => {
        const isActive = menuBtn.classList.toggle('active');
        mobileMenu.classList.toggle('active');
        menuBtn.setAttribute('aria-expanded', isActive);
        mobileMenu.setAttribute('aria-hidden', !isActive);
        document.body.style.overflow = isActive ? 'hidden' : '';
      });
      
      mobileLinks.forEach(link => {
        link.addEventListener('click', () => {
          menuBtn.classList.remove('active');
          mobileMenu.classList.remove('active');
          menuBtn.setAttribute('aria-expanded', 'false');
          mobileMenu.setAttribute('aria-hidden', 'true');
          document.body.style.overflow = '';
        });
      });

      // === CUSTOM CURSOR ===
      const cursor = document.getElementById('cursor');
      const cursorDot = document.getElementById('cursor-dot');
      const cursorRing = document.getElementById('cursor-ring');
      const interactiveElements = document.querySelectorAll('a, button, .gallery__item');
      
      let mouseX = 0, mouseY = 0;
      let ringX = 0, ringY = 0;
      
      if (window.matchMedia('(hover: hover) and (pointer: fine)').matches && cursor) {
        document.addEventListener('mousemove', (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
          cursorDot.style.left = mouseX + 'px';
          cursorDot.style.top = mouseY + 'px';
          cursor.classList.add('visible');
        });
        
        function animateRing() {
          ringX += (mouseX - ringX) * 0.15;
          ringY += (mouseY - ringY) * 0.15;
          cursorRing.style.left = ringX + 'px';
          cursorRing.style.top = ringY + 'px';
          requestAnimationFrame(animateRing);
        }
        animateRing();
        
        document.addEventListener('mouseleave', () => cursor.classList.remove('visible'));
        document.addEventListener('mousedown', () => cursor.classList.add('clicking'));
        document.addEventListener('mouseup', () => cursor.classList.remove('clicking'));
        
        interactiveElements.forEach(el => {
          el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
        });
        
        // Add hover for dynamically interactive elements
        document.addEventListener('mouseover', (e) => {
          if (e.target.closest('.lightbox__close, .lightbox__dot')) {
            cursor.classList.add('hovering');
          }
        });
        document.addEventListener('mouseout', (e) => {
          if (e.target.closest('.lightbox__close, .lightbox__dot')) {
            cursor.classList.remove('hovering');
          }
        });
      }

      // === CATEGORY SWITCHING ===
      const categoryBtns = document.querySelectorAll('.category-btn');
      const galleryItems = document.querySelectorAll('.gallery__item');
      const categoryName = document.getElementById('category-name');
      const categoryCount = document.getElementById('category-count');
      
      function setCategory(category) {
        // Update buttons
        categoryBtns.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.category === category);
        });
        
        // Update images
        galleryItems.forEach(item => {
          const isActive = item.dataset.category === category;
          item.classList.toggle('active', isActive);
        });
        
        // Update overlay text
        const capitalizedCategory = category.charAt(0).toUpperCase() + category.slice(1);
        categoryName.textContent = capitalizedCategory;
        
        // Count active items
        const activeCount = document.querySelectorAll(`.gallery__item[data-category="${category}"]`).length;
        categoryCount.textContent = `(${activeCount})`;
      }
      
      categoryBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          setCategory(btn.dataset.category);
        });
      });

      // === HORIZONTAL SCROLL ===
      const gallery = document.getElementById('gallery');
      
      // Mouse wheel horizontal scroll
      gallery.addEventListener('wheel', (e) => {
        if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
          e.preventDefault();
          gallery.scrollLeft += e.deltaY;
        }
      }, { passive: false });

      // Keyboard navigation (when lightbox is closed)
      document.addEventListener('keydown', (e) => {
        if (lightbox.classList.contains('active')) return;
        
        if (e.key === 'ArrowRight') {
          gallery.scrollBy({ left: 300, behavior: 'smooth' });
        } else if (e.key === 'ArrowLeft') {
          gallery.scrollBy({ left: -300, behavior: 'smooth' });
        }
      });

      // === LIGHTBOX ===
      const lightbox = document.getElementById('lightbox');
      const lightboxImage = document.getElementById('lightbox-image');
      const lightboxClose = document.getElementById('lightbox-close');
      const lightboxNav = document.getElementById('lightbox-nav');
      const lightboxCounter = document.getElementById('lightbox-counter');
      
      let currentImages = [];
      let currentIndex = 0;
      let currentCategory = 'landscape';
      
      function generateDots() {
        lightboxNav.innerHTML = '';
        currentImages.forEach((_, index) => {
          const dot = document.createElement('button');
          dot.className = 'lightbox__dot' + (index === currentIndex ? ' active' : '');
          dot.setAttribute('aria-label', `Go to image ${index + 1}`);
          dot.addEventListener('click', (e) => {
            e.stopPropagation();
            goToImage(index);
          });
          lightboxNav.appendChild(dot);
        });
      }
      
      function updateDots() {
        const dots = lightboxNav.querySelectorAll('.lightbox__dot');
        dots.forEach((dot, index) => {
          dot.classList.toggle('active', index === currentIndex);
        });
      }
      
      function openLightbox(imgElement, category) {
        // Get all images from the clicked category
        currentCategory = category;
        currentImages = Array.from(document.querySelectorAll(`.gallery__item[data-category="${category}"] img`));
        currentIndex = currentImages.indexOf(imgElement);
        
        loadImage(currentIndex);
        generateDots();
        updateCounter();
        
        lightbox.classList.add('active');
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }
      
      function closeLightbox() {
        lightbox.classList.remove('active');
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }
      
      function loadImage(index) {
        const img = currentImages[index];
        lightboxImage.src = img.src.replace('w=400', 'w=1200').replace('h=600', 'h=1200').replace('h=500', 'h=1200').replace('h=400', 'h=1200').replace('h=300', 'h=1200');
        lightboxImage.alt = img.alt;
      }
      
      function updateCounter() {
        lightboxCounter.textContent = `${currentIndex + 1} / ${currentImages.length}`;
      }
      
      function goToImage(index) {
        currentIndex = index;
        loadImage(currentIndex);
        updateDots();
        updateCounter();
      }
      
      function showPrev() {
        currentIndex = (currentIndex - 1 + currentImages.length) % currentImages.length;
        loadImage(currentIndex);
        updateDots();
        updateCounter();
      }
      
      function showNext() {
        currentIndex = (currentIndex + 1) % currentImages.length;
        loadImage(currentIndex);
        updateDots();
        updateCounter();
      }
      
      // Click on ANY gallery item to open lightbox (active or not)
      galleryItems.forEach((item) => {
        item.style.cursor = 'pointer';
        item.addEventListener('click', () => {
          const img = item.querySelector('img');
          const category = item.dataset.category;
          if (img) {
            openLightbox(img, category);
          }
        });
      });
      
      // Close button
      lightboxClose.addEventListener('click', closeLightbox);
      
      // Click outside image to close
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
          closeLightbox();
        }
      });
      
      // Keyboard navigation in lightbox
      document.addEventListener('keydown', (e) => {
        if (!lightbox.classList.contains('active')) return;
        
        if (e.key === 'Escape') {
          closeLightbox();
        } else if (e.key === 'ArrowLeft') {
          showPrev();
        } else if (e.key === 'ArrowRight') {
          showNext();
        }
      });

    })();
  </script>
